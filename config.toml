mode = "paper"

[kalshi]
base_url = "https://api.elections.kalshi.com/trade-api/v2"
poll_interval_secs = 60
rate_limit_per_sec = 2

[trading]
initial_capital = 10000.0
max_positions = 100
kelly_fraction = 0.25
max_position_pct = 0.10
take_profit_pct = 0.50
stop_loss_pct = 0.99
max_hold_hours = 48
min_time_to_close_hours = 2
max_time_to_close_hours = 504
cash_reserve_pct = 0.20
max_entries_per_tick = 5

[persistence]
db_path = "/home/nicholai/prediction-markets/data/kalshi-paper.db"

[web]
enabled = true
bind_addr = "127.0.0.1:3030"
parquet_data_dir = "/mnt/work/prediction-market-analysis/data"

[circuit_breaker]
max_drawdown_pct = 0.15
max_daily_loss_pct = 0.05
max_positions = 100
max_single_position_pct = 0.10
max_consecutive_errors = 5
max_fills_per_hour = 500
max_fills_per_day = 2000

[fees]
taker_rate = 0.07
maker_rate = 0.0175
max_per_contract = 0.02
assume_taker = true
min_edge_after_fees = 0.02

[paper_execution]
# execution realism for paper fills
spread_bps = 120.0
slippage_bps = 12.0
impact_bps_per_1pct_24h = 8.0
max_fill_pct_24h = 0.01
min_fill_qty = 1
min_latency_ms = 120
max_latency_ms = 700

# strict tradeability gates for entries
min_trade_volume_24h = 10000
max_entry_spread_bps = 180.0
max_entry_sweep_pct_24h = 0.0025
urgent_entry_sweep_pct_24h = 0.0075
urgency_score_threshold = 0.80
max_limit_drift_bps = 20.0
urgent_max_limit_drift_bps = 80.0
